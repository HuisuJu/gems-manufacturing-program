syntax = "proto3";

package factory.doorlock;

import "factory_system_data.proto";
import "factory_matter_data.proto";

// -----------------------------------------------------------------------------
// Doorlock-specific factory data
// -----------------------------------------------------------------------------

// -----------------------------------------------------------------------------
// Doorlock system information (extends base SystemData)
// -----------------------------------------------------------------------------
message DoorlockSystemData {
  // Base system fields (common across all devices)
  optional factory.SystemData base = 1;

  // Doorlock-specific system fields
  // Add any doorlock-specific system information here
  // For example: lock type, motor type, etc.
}

// -----------------------------------------------------------------------------
// Doorlock-specific configuration
// -----------------------------------------------------------------------------
message DoorlockSpecificData {
  // Lock motor calibration data
  optional bytes motor_calibration = 1;

  // NFC tag UID
  optional bytes nfc_tag_uid = 2;

  // Add other doorlock-specific fields as needed
}

// -----------------------------------------------------------------------------
// Complete doorlock factory data
// -----------------------------------------------------------------------------
message DoorlockFactoryData {
  // Doorlock system information (model-specific)
  optional DoorlockSystemData system = 1;

  // Matter common data (same across all Matter devices)
  optional factory.MatterFactoryData matter = 2;

  // Doorlock-specific configuration
  optional DoorlockSpecificData specific = 3;
}