syntax = "proto3";

package factory;

// -----------------------------------------------------------------------------
// Command types
// -----------------------------------------------------------------------------
enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_READ        = 1;
  COMMAND_TYPE_WRITE       = 2;
}

// -----------------------------------------------------------------------------
// Status codes
// -----------------------------------------------------------------------------
enum StatusCode {
  STATUS_CODE_UNSPECIFIED      = 0;
  STATUS_CODE_OK               = 1;
  STATUS_CODE_INVALID_REQUEST  = 2;
  STATUS_CODE_UNSUPPORTED      = 3;
  STATUS_CODE_NOT_FOUND        = 4;
  STATUS_CODE_INTERNAL_ERROR   = 5;
  STATUS_CODE_WRITE_FAILED     = 6;
  STATUS_CODE_READ_FAILED      = 7;
}

// -----------------------------------------------------------------------------
// Field types for READ operations
// -----------------------------------------------------------------------------
enum FactoryFieldType {
  FACTORY_FIELD_UNSPECIFIED = 0;

  // System fields (1-99) - model-specific
  FACTORY_FIELD_SYSTEM_SERIAL_NUMBER      = 1;
  FACTORY_FIELD_SYSTEM_MANUFACTURING_DATE = 2;
  FACTORY_FIELD_SYSTEM_HARDWARE_VERSION   = 3;
  FACTORY_FIELD_SYSTEM_FIRMWARE_VERSION   = 4;

  // Matter attestation fields (100-199) - common across all Matter devices
  FACTORY_FIELD_MATTER_ATTESTATION_DAC_CERT                  = 100;
  FACTORY_FIELD_MATTER_ATTESTATION_DAC_PRIVATE_KEY           = 101;
  FACTORY_FIELD_MATTER_ATTESTATION_PAI_CERT                  = 102;
  FACTORY_FIELD_MATTER_ATTESTATION_CERTIFICATION_DECLARATION = 103;

  // Matter commissioning fields (200-299) - common across all Matter devices
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_PASSCODE        = 200;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_SALT            = 201;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_ITERATION_COUNT = 202;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_VERIFIER        = 203;
  FACTORY_FIELD_MATTER_COMMISSIONING_ONBOARDING_PAYLOAD      = 204;

  // Device-specific fields start from 1000
  // Doorlock: 1000-1999
  FACTORY_FIELD_DOORLOCK_MOTOR_CALIBRATION = 1000;
  FACTORY_FIELD_DOORLOCK_NFC_TAG_UID       = 1001;

  // Thermostat: 2000-2999
  FACTORY_FIELD_THERMOSTAT_TEMPERATURE_CALIBRATION = 2000;
  FACTORY_FIELD_THERMOSTAT_HUMIDITY_CALIBRATION    = 2001;
}

// -----------------------------------------------------------------------------
// Field data entry (nanopb-friendly: no map, use repeated instead)
// -----------------------------------------------------------------------------
message FieldDataEntry {
  FactoryFieldType field_type = 1;
  bytes data = 2;
}

// -----------------------------------------------------------------------------
// READ command: PC requests specific fields, device responds with data
// -----------------------------------------------------------------------------
message ReadRequest {
  // List of fields to read from the device
  repeated FactoryFieldType fields = 1;
}

message ReadResponse {
  // Status code for the read operation
  StatusCode status = 1;

  // Optional error message
  string error_message = 2;

  // Field values (only requested fields are populated)
  // nanopb-friendly: repeated instead of map
  repeated FieldDataEntry field_data = 3;
}

// -----------------------------------------------------------------------------
// WRITE command: PC sends data, device writes and returns success/failure
// -----------------------------------------------------------------------------
message WriteRequest {
  // Field values to write
  // nanopb-friendly: repeated instead of map
  repeated FieldDataEntry field_data = 1;
}

message WriteResponse {
  // Status code for the write operation
  StatusCode status = 1;

  // Optional error message
  string error_message = 2;

  // List of successfully written fields
  repeated FactoryFieldType written_fields = 3;

  // List of fields that failed to write
  repeated FactoryFieldType failed_fields = 4;
}

// -----------------------------------------------------------------------------
// Top-level request/response envelopes
// -----------------------------------------------------------------------------
message FactoryRequest {
  CommandType command = 1;

  oneof payload {
    ReadRequest  read  = 2;
    WriteRequest write = 3;
  }
}

message FactoryResponse {
  CommandType command = 1;

  oneof payload {
    ReadResponse  read  = 2;
    WriteResponse write = 3;
  }
}
