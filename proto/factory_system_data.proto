syntax = "proto3";

package factory;

// -----------------------------------------------------------------------------
// System field types (READ/WRITE target fields)
// -----------------------------------------------------------------------------
enum SystemFieldType {
  SYSTEM_FIELD_UNSPECIFIED = 0;
  SYSTEM_FIELD_SERIAL_NUMBER = 1;
  SYSTEM_FIELD_MANUFACTURING_DATE = 2;
  SYSTEM_FIELD_HARDWARE_VERSION = 3;
  SYSTEM_FIELD_FIRMWARE_VERSION = 4;
}

// -----------------------------------------------------------------------------
// System field data entry
// -----------------------------------------------------------------------------
message SystemFieldDataEntry {
  SystemFieldType field_type = 1;
  bytes data = 2;
}

// -----------------------------------------------------------------------------
// Base system information (common interface for all devices)
// Each device model should extend this with their specific fields
// -----------------------------------------------------------------------------
message SystemData {
  // Device serial number
  optional string serial_number = 1;

  // Manufacturing date (ISO 8601 format: YYYY-MM-DD)
  optional string manufacturing_date = 2;

  // Hardware version
  optional string hardware_version = 3;

  // Firmware version at manufacturing
  optional string firmware_version = 4;
}
