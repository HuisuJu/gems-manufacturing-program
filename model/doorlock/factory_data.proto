syntax = "proto3";

package factory;

// -----------------------------------------------------------------------------
// Command
// -----------------------------------------------------------------------------
enum CommandType {
  COMMAND_TYPE_UNSPECIFIED = 0;
  COMMAND_TYPE_PUSH        = 1;
  COMMAND_TYPE_COMMIT      = 2;
  COMMAND_TYPE_READ        = 3;
}

// -----------------------------------------------------------------------------
// Status
// -----------------------------------------------------------------------------
enum StatusCode {
  STATUS_CODE_UNSPECIFIED      = 0;
  STATUS_CODE_OK               = 1;
  STATUS_CODE_INVALID_REQUEST  = 2;
  STATUS_CODE_UNSUPPORTED      = 3;
  STATUS_CODE_NOT_FOUND        = 4;
  STATUS_CODE_INTERNAL_ERROR   = 5;
  STATUS_CODE_NOT_READY        = 6;
  STATUS_CODE_INVALID_STATE    = 7;
  STATUS_CODE_COMMIT_FAILED    = 8;
}

// -----------------------------------------------------------------------------
// Field selector for READ
// -----------------------------------------------------------------------------
enum FactoryField {
  FACTORY_FIELD_UNSPECIFIED                          = 0;

  FACTORY_FIELD_SYSTEM_SERIAL_NUMBER                 = 1;
  FACTORY_FIELD_SYSTEM_MANUFACTURING_DATE            = 2;

  FACTORY_FIELD_MATTER_ATTESTATION_DAC_CERT          = 100;
  FACTORY_FIELD_MATTER_ATTESTATION_DAC_PRIVATE_KEY   = 101;
  FACTORY_FIELD_MATTER_ATTESTATION_PAI_CERT          = 102;
  FACTORY_FIELD_MATTER_ATTESTATION_CERTIFICATION_DECLARATION = 103;

  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_PASSCODE        = 200;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_SALT            = 201;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_ITERATION_COUNT = 202;
  FACTORY_FIELD_MATTER_COMMISSIONING_SPAKE2P_VERIFIER        = 203;
  FACTORY_FIELD_MATTER_COMMISSIONING_ONBOARDING_PAYLOAD      = 204;
}

// -----------------------------------------------------------------------------
// Factory data payload
// -----------------------------------------------------------------------------
message FactoryData {

  // -----------------------------
  // System (Non-Matter)
  // -----------------------------
  message System {
    optional string serial_number      = 1;
    optional string manufacturing_date = 2;
  }

  // -----------------------------
  // Matter
  // -----------------------------
  message Matter {

    // Attestation / credentials material
    message Attestation {
      optional bytes dac_cert                  = 1;
      optional bytes dac_private_key           = 2;
      optional bytes pai_cert                  = 3;
      optional bytes certification_declaration = 4;
    }

    // Commissioning / onboarding material
    message Commissioning {
      optional uint32 spake2p_passcode        = 1;
      optional bytes  spake2p_salt            = 2;
      optional uint32 spake2p_iteration_count = 3;
      optional bytes  spake2p_verifier        = 4;
      optional string onboarding_payload      = 5;
    }

    optional Attestation   attestation   = 1;
    optional Commissioning commissioning = 2;
  }

  optional System system = 1;
  optional Matter matter = 2;
}

// -----------------------------------------------------------------------------
// Request messages
// -----------------------------------------------------------------------------
message PushRequest {
  // Partial update is allowed.
  FactoryData data = 1;
}

message CommitRequest {
}

message ReadRequest {
  repeated FactoryField fields = 1;
}

// -----------------------------------------------------------------------------
// Response messages
// -----------------------------------------------------------------------------
message PushResponse {
}

message CommitResponse {
}

message ReadResponse {
  // Only requested / available fields are expected to be populated.
  FactoryData data = 1;
}

// -----------------------------------------------------------------------------
// Top-level request / response envelopes
// -----------------------------------------------------------------------------
message FactoryRequest {
  CommandType command = 1;

  oneof payload {
    PushRequest   push   = 2;
    CommitRequest commit = 3;
    ReadRequest   read   = 4;
  }
}

message FactoryResponse {
  CommandType command     = 1;
  StatusCode  status_code = 2;
  string      message     = 3;

  oneof payload {
    PushResponse   push   = 4;
    CommitResponse commit = 5;
    ReadResponse   read   = 6;
  }
}