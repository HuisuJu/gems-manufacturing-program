syntax = "proto3";

package factory.command;

import "factory_data.proto";

message FactoryReadRequest {
  repeated factory.data.FactoryDataItem items = 1;
}

message FactoryReadResponse {
  factory.data.FactoryData data = 1;
}

message FactoryWriteRequest {
  factory.data.FactoryData data = 1;
}

message FactoryWriteResponse {
  repeated factory.data.FactoryDataItem items = 1;
}
